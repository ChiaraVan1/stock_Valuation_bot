name: 双轨估值分析

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码（如 002223）'
        required: true
        type: string
      stock_name:
        description: '股票名称（如 鱼跃医疗）'
        required: true
        type: string
      report_year:
        description: '报告年度（如 2025）'
        required: true
        type: string
      current_price:
        description: '当前股价（可不填，从截图自动读取）'
        required: false
        default: ''
        type: string
      months:
        description: '查询研报月数'
        required: false
        default: '12'
        type: string

jobs:
  valuation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install eastmoney-master/

      - name: 运行双轨估值
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/valuation.py \
            --code ${{ github.event.inputs.stock_code }} \
            --name "${{ github.event.inputs.stock_name }}" \
            --year ${{ github.event.inputs.report_year }} \
            --price ${{ github.event.inputs.current_price }} \
            --months ${{ github.event.inputs.months }}

      - name: 上传估值报告
        uses: actions/upload-artifact@v4
        with:
          name: 估值报告-${{ github.event.inputs.stock_code }}-${{ github.run_id }}
          path: output/
          retention-days: 90
